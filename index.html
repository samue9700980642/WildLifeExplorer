<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WildLife Explorer</title>
<style>
  /* ===== Reset & Body ===== */
  * { margin:0; padding:0; box-sizing:border-box; font-family: Arial, sans-serif; }
  body { display:flex; min-height:100vh; background:#f0f0f0; transition: background 0.3s; }

  /* ===== Sidebar ===== */
  #sidebar {
    width: 250px;
    background:#2c3e50;
    color:#ecf0f1;
    padding:20px;
    display:flex;
    flex-direction:column;
    gap:20px;
  }
  #sidebar h2 { margin-bottom:10px; text-align:center; }
  #sidebar input, #sidebar button, #sidebar textarea {
    width:100%; padding:8px; border:none; border-radius:5px;
    margin-bottom:10px; outline:none;
  }
  #sidebar button { background:#3498db; color:#fff; cursor:pointer; transition:0.2s; }
  #sidebar button:hover { background:#2980b9; }

  /* ===== Main Content ===== */
  #main { flex:1; padding:20px; overflow-y:auto; }
  #topbar { display:flex; justify-content:flex-end; margin-bottom:20px; }
  #topbar span { font-weight:bold; color:#2c3e50; }

  /* ===== Cards Grid ===== */
  #cards { display:grid; grid-template-columns: repeat(auto-fill,minmax(200px,1fr)); gap:20px; }
  .card { background:#fff; border-radius:10px; overflow:hidden; box-shadow:0 4px 6px rgba(0,0,0,0.1); cursor:pointer; transition:0.3s; }
  .card:hover { transform:translateY(-5px); box-shadow:0 8px 12px rgba(0,0,0,0.2); }
  .card img { width:100%; height:150px; object-fit:cover; }
  .card .name { padding:10px; font-weight:bold; text-align:center; }

  /* ===== Modal ===== */
  #modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); justify-content:center; align-items:center; }
  #modalContent { background:#fff; padding:20px; border-radius:10px; width:90%; max-width:500px; position:relative; }
  #modalContent img { width:100%; border-radius:10px; margin-bottom:15px; }
  #modalContent h2 { margin-bottom:10px; }
  #modalContent p { margin-bottom:8px; }
  #closeModal { position:absolute; top:10px; right:15px; font-size:20px; cursor:pointer; }

  /* ===== Dark Theme ===== */
  body.dark { background:#1c1c1c; color:#ecf0f1; }
  body.dark #sidebar { background:#34495e; }
  body.dark .card { background:#2c3e50; color:#ecf0f1; }
  body.dark #modalContent { background:#34495e; color:#ecf0f1; }
</style>
</head>
<body>

  <!-- Sidebar -->
  <div id="sidebar">
    <h2>WildLife Explorer</h2>
    <input type="text" id="searchInput" placeholder="Search Animal...">
    <button id="themeBtn">Toggle Dark/Light</button>
    <textarea id="feedback" rows="4" placeholder="Give feedback..."></textarea>
    <button id="submitFeedback">Submit Feedback</button>
  </div>

  <!-- Main Content -->
  <div id="main">
    <div id="topbar"><span>CEO: Subu Gurung</span></div>
    <div id="cards"></div>
  </div>

  <!-- Modal -->
  <div id="modal">
    <div id="modalContent">
      <span id="closeModal">&times;</span>
      <img id="modalImg" src="" alt="Animal Image">
      <h2 id="modalName"></h2>
      <p><b>Type:</b> <span id="modalType"></span></p>
      <p><b>Location:</b> <span id="modalLocation"></span></p>
      <p id="modalInfo"></p>
    </div>
  </div>

<script>
  let animals = [];

  // Load animals.json
  fetch('animals.json')
    .then(res => res.json())
    .then(data => {
      animals = data;
      displayCards(animals);
    });

  // Display animal cards
  function displayCards(list) {
    const cardsContainer = document.getElementById('cards');
    cardsContainer.innerHTML = '';
    list.forEach(animal => {
      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = `<img src="${animal.image}" alt="${animal.name}"><div class="name">${animal.name}</div>`;
      card.addEventListener('click', () => openModal(animal));
      cardsContainer.appendChild(card);
    });
  }

  // Modal functions
  const modal = document.getElementById('modal');
  const modalImg = document.getElementById('modalImg');
  const modalName = document.getElementById('modalName');
  const modalType = document.getElementById('modalType');
  const modalLocation = document.getElementById('modalLocation');
  const modalInfo = document.getElementById('modalInfo');
  const closeModalBtn = document.getElementById('closeModal');

  function openModal(animal) {
    modal.style.display = 'flex';
    modalImg.src = animal.image;
    modalName.textContent = animal.name;
    modalType.textContent = animal.type;
    modalLocation.textContent = animal.location;
    modalInfo.textContent = animal.info;
  }
  closeModalBtn.onclick = () => { modal.style.display = 'none'; }
  window.onclick = (e) => { if(e.target == modal) modal.style.display = 'none'; }

  // Search functionality
  const searchInput = document.getElementById('searchInput');
  searchInput.addEventListener('input', () => {
    const query = searchInput.value.toLowerCase();
    const filtered = animals.filter(a => a.name.toLowerCase().includes(query));
    displayCards(filtered);
  });

  // Dark/Light theme toggle
  const themeBtn = document.getElementById('themeBtn');
  themeBtn.addEventListener('click', () => { document.body.classList.toggle('dark'); });

  // Feedback button
  document.getElementById('submitFeedback').addEventListener('click', () => {
    const feedback = document.getElementById('feedback').value;
    if(feedback) { alert('Feedback submitted! Thank you.'); document.getElementById('feedback').value=''; }
    else { alert('Please enter feedback first.'); }
  });
</script>

</body>
</html>
